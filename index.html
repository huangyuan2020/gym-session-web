<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#00a86b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="力量记录" />
    <title>力量记录</title>
    <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./app-icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=43" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="./app-icon.svg" alt="" class="brand-mark" />
          <div>
            <div class="brand-title">力量记录</div>
          </div>
        </div>
        <div class="topbar-elapsed" aria-label="训练用时">
          <span>用时</span>
          <strong id="sessionElapsed">00:00</strong>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="dataToggle" type="button" title="训练数据" aria-label="训练数据">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3v18h18" />
              <path d="m7 15 4-4 3 3 5-7" />
            </svg>
          </button>
          <button class="icon-button" id="historyToggle" type="button" title="历史记录" aria-label="历史记录">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v5h5" />
              <path d="M12 7v5l3 2" />
            </svg>
          </button>
          <button class="finish-top-button" id="finishWorkoutTop" type="button" title="完成训练" aria-label="完成训练">
            完成
          </button>
        </div>
      </header>

      <main class="main-stack">
        <section class="current-panel" id="currentPanel" aria-label="当前训练">
          <div class="current-title-row">
            <h1 id="currentName">加载中</h1>
            <div class="set-line" id="currentSetLine">第 1 / 1 组</div>
          </div>

          <div class="timer-block" aria-live="polite">
            <div class="timer-value" id="mainTimer">00:00</div>
          </div>

          <div class="current-inputs">
            <label>
              <span>次数</span>
              <div class="stepper" data-stepper="reps">
                <button class="step-button" type="button" data-step-target="reps" data-step-dir="-1" aria-label="次数减一">−</button>
                <input id="currentReps" type="number" inputmode="numeric" min="0" step="1" />
                <button class="step-button" type="button" data-step-target="reps" data-step-dir="1" aria-label="次数加一">+</button>
              </div>
            </label>
            <label>
              <span>重量 kg</span>
              <div class="stepper" data-stepper="weight">
                <button class="step-button" type="button" data-step-target="weight" data-step-dir="-1" aria-label="重量减少">−</button>
                <input id="currentWeight" type="number" inputmode="decimal" min="0" step="1" />
                <button class="step-button" type="button" data-step-target="weight" data-step-dir="1" aria-label="重量增加">+</button>
              </div>
            </label>
            <label>
              <span>休息 秒</span>
              <div class="stepper" data-stepper="restSec">
                <button class="step-button" type="button" data-step-target="restSec" data-step-dir="-1" aria-label="休息减少十五秒">−</button>
                <input id="currentRest" type="number" inputmode="numeric" min="0" step="15" />
                <button class="step-button" type="button" data-step-target="restSec" data-step-dir="1" aria-label="休息增加十五秒">+</button>
              </div>
            </label>
          </div>

          <div class="action-row">
            <button class="primary-action" id="primaryAction" type="button">开始</button>
            <button class="icon-button compact-action" id="undoAction" type="button" title="撤销" aria-label="撤销">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 14 4 9l5-5" />
                <path d="M4 9h10a6 6 0 0 1 0 12h-2" />
              </svg>
            </button>
          </div>

        </section>

        <section class="queue-section mobile-panel" id="queueSection" aria-label="训练队列">
          <div class="section-heading">
            <h2>训练队列</h2>
            <div class="plan-switcher">
              <div class="plan-tabs" id="planTabs" aria-label="训练计划"></div>
            </div>
            <div class="heading-actions">
              <button class="icon-text-button" id="addExercise" type="button">
                <span>加动作</span>
              </button>
            </div>
          </div>
          <div class="exercise-list" id="exerciseList"></div>
        </section>

        <section class="finish-section" aria-label="完成训练">
          <button class="finish-button" id="finishWorkout" type="button">完成训练</button>
        </section>

        <section class="record-section mobile-panel hidden" id="recordSection" aria-label="本次训练记录">
          <div class="section-heading">
            <h2>本次记录</h2>
            <button class="icon-button" id="closeRecord" type="button" title="关闭记录" aria-label="关闭记录">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </div>
          <div class="record-timeline" id="recordTimeline"></div>
          <textarea class="hidden" id="recordJson" readonly spellcheck="false"></textarea>
          <div class="record-actions">
            <button class="secondary-action" id="copyRecord" type="button">复制 JSON</button>
            <button class="primary-action compact" id="newSession" type="button">新训练</button>
          </div>
        </section>

        <section class="data-section mobile-panel hidden" id="dataSection" aria-label="训练数据">
          <div class="section-heading">
            <h2>训练数据</h2>
            <div class="heading-actions">
              <button class="plain-button" id="exportBackup" type="button">备份</button>
              <button class="plain-button" id="exportCsv" type="button">CSV</button>
              <button class="icon-button mobile-only" id="closeData" type="button" title="关闭数据" aria-label="关闭数据">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>
          </div>
          <div class="data-actions">
            <button class="secondary-action" id="copyAnalysis" type="button">复制分析摘要</button>
            <button class="secondary-action" id="importBackup" type="button">导入备份</button>
            <input id="importBackupFile" class="hidden" type="file" accept="application/json,.json" />
          </div>
          <div class="analytics-summary" id="analyticsSummary"></div>
          <div class="analytics-block">
            <div class="block-heading">
              <strong>最近容量</strong>
              <span id="volumeTrendLabel"></span>
            </div>
            <div class="volume-chart" id="volumeChart"></div>
          </div>
          <div class="analytics-block">
            <div class="block-heading">
              <strong>动作进步</strong>
              <span id="exerciseTrendLabel"></span>
            </div>
            <div class="exercise-analytics" id="exerciseAnalytics"></div>
          </div>
        </section>

        <section class="history-section mobile-panel hidden" id="historySection" aria-label="历史记录">
          <div class="section-heading">
            <h2>历史记录</h2>
            <div class="heading-actions">
              <button class="plain-button danger-text" id="clearHistory" type="button">清空</button>
              <button class="icon-button mobile-only" id="closeHistory" type="button" title="关闭历史" aria-label="关闭历史">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>

    <div class="mobile-scrim" id="mobileScrim" aria-hidden="true"></div>

    <div class="sheet-backdrop hidden" id="exerciseSheet" aria-hidden="true">
      <form class="sheet" id="exerciseForm">
        <div class="sheet-grip"></div>
        <div class="section-heading">
          <h2 id="exerciseFormTitle">添加动作</h2>
          <button class="icon-button" id="cancelExercise" type="button" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <label class="full-label">
          <span>动作</span>
          <input id="exerciseNameInput" type="text" autocomplete="off" required />
        </label>
        <div class="form-grid">
          <label>
            <span>组数</span>
            <input id="exerciseSetsInput" type="number" inputmode="numeric" min="1" step="1" required />
          </label>
          <label>
            <span>次数</span>
            <input id="exerciseRepsInput" type="number" inputmode="numeric" min="0" step="1" required />
          </label>
          <label>
            <span>重量 kg</span>
            <input id="exerciseWeightInput" type="number" inputmode="decimal" min="0" step="0.5" required />
          </label>
          <label>
            <span>休息 秒</span>
            <input id="exerciseRestInput" type="number" inputmode="numeric" min="0" step="5" required />
          </label>
        </div>
        <button class="primary-action compact" id="saveExercise" type="submit">保存</button>
      </form>
    </div>

    <div class="sheet-backdrop hidden" id="planSaveSheet" aria-hidden="true">
      <div class="sheet plan-save-sheet" role="dialog" aria-modal="true" aria-labelledby="planSaveTitle">
        <div class="sheet-grip"></div>
        <div class="section-heading">
          <h2 id="planSaveTitle">保存计划变化？</h2>
          <button class="icon-button" id="dismissPlanSave" type="button" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <p class="sheet-copy" id="planSaveMessage">训练队列里的动作有增减。</p>
        <div class="plan-save-dialog-actions">
          <button class="primary-action compact" id="confirmOverwritePlan" type="button">覆盖本计划</button>
          <button class="secondary-action" id="confirmSaveAsPlan" type="button">另存为新计划</button>
          <button class="plain-button" id="skipPlanSave" type="button">暂不保存</button>
        </div>
      </div>
    </div>

    <div class="sheet-backdrop hidden" id="finishConfirmSheet" aria-hidden="true">
      <div class="sheet finish-confirm-sheet" role="dialog" aria-modal="true" aria-labelledby="finishConfirmTitle">
        <div class="sheet-grip"></div>
        <div class="section-heading">
          <h2 id="finishConfirmTitle">完成训练？</h2>
          <button class="icon-button" id="dismissFinishConfirm" type="button" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <p class="sheet-copy" id="finishConfirmMessage"></p>
        <div class="finish-confirm-actions">
          <button class="secondary-action" id="cancelFinishWorkout" type="button">继续训练</button>
          <button class="primary-action compact" id="confirmFinishWorkout" type="button">完成并保存</button>
        </div>
      </div>
    </div>

    <script src="./app.js?v=43" defer></script>
  </body>
</html>
