    <style>
:root {
  color-scheme: light;
  --bg: #f3f6f4;
  --surface: #ffffff;
  --surface-strong: #f7faf8;
  --ink: #142019;
  --muted: #5e6b64;
  --line: #d7e0db;
  --primary: #00a86b;
  --primary-pressed: #008a58;
  --accent: #ff633f;
  --blue: #316bff;
  --gold: #ffc247;
  --shadow: 0 10px 28px rgba(28, 42, 31, 0.1);
  --radius: 8px;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
}

body {
  min-height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button,
input,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.app-shell {
  width: min(100%, 760px);
  min-height: 100vh;
  min-height: 100dvh;
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top) + 12px) 14px calc(env(safe-area-inset-bottom) + 24px);
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: -12px -14px 12px;
  padding: calc(env(safe-area-inset-top) + 12px) 14px 10px;
  background: rgba(243, 246, 244, 0.94);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(217, 224, 214, 0.7);
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
}

.topbar-elapsed {
  display: grid;
  flex: 0 0 auto;
  min-width: 58px;
  color: var(--muted);
  text-align: center;
}

.topbar-elapsed span {
  font-size: 9px;
  font-weight: 750;
  line-height: 1.1;
}

.topbar-elapsed strong {
  color: var(--ink);
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  line-height: 1.25;
}

.topbar-actions .icon-button {
  width: 38px;
  min-height: 38px;
}

.topbar-actions .finish-top-button {
  min-height: 38px;
  border-radius: var(--radius);
  padding: 0 12px;
  border: 1px solid rgba(0, 168, 107, 0.42);
  border-color: rgba(0, 168, 107, 0.42);
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  font-weight: 900;
}

.brand {
  display: flex;
  align-items: center;
  min-width: 0;
  gap: 10px;
}

.brand-mark {
  width: 38px;
  height: 38px;
  border-radius: var(--radius);
  box-shadow: 0 4px 14px rgba(0, 168, 107, 0.22);
  flex: 0 0 auto;
}

.brand-title {
  overflow: hidden;
  font-size: 17px;
  line-height: 1.15;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.main-stack {
  display: grid;
  gap: 10px;
}

.current-panel,
.queue-section,
.finish-section,
.record-section,
.data-section,
.history-section {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: none;
}

.current-panel {
  padding: 16px;
}

body[data-phase="work"] .current-panel {
  border-color: rgba(0, 168, 107, 0.4);
}

body[data-phase="work"] .topbar-elapsed strong,
body[data-phase="work"] #mainTimer {
  color: var(--primary);
}

body[data-phase="rest"] .current-panel {
  border-color: rgba(255, 99, 63, 0.48);
}

body[data-phase="rest"] .topbar-elapsed strong,
body[data-phase="rest"] #mainTimer {
  color: var(--accent);
}

body[data-phase="rest"] #primaryAction {
  background: var(--accent);
  box-shadow: 0 8px 18px rgba(255, 99, 63, 0.22);
}

body[data-phase="rest"] #primaryAction:active {
  background: #e64f2f;
}

.panel-kicker,
.section-heading,
.record-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.current-title-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: start;
  gap: 10px;
  min-width: 0;
}

.queue-section .section-heading {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
}

.queue-section .section-heading h2 {
  white-space: nowrap;
}

.heading-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.mobile-only {
  display: none;
}

.panel-kicker {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  justify-content: flex-end;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  margin: 0;
  font-size: 34px;
  line-height: 1.08;
  word-break: break-word;
}

h2 {
  font-size: 17px;
  line-height: 1.25;
}

.set-line {
  margin-top: 2px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.35;
  white-space: nowrap;
}

.timer-block {
  margin-top: 16px;
}

.current-panel.no-exercise .timer-block,
.current-panel.no-exercise .current-inputs {
  display: none;
}

.current-panel.no-exercise .action-row {
  grid-template-columns: minmax(0, 1fr);
}

.current-panel.no-exercise .compact-action {
  display: none;
}

.timer-value {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 88px;
  border: 1px solid #cfd9cf;
  border-radius: var(--radius);
  background: var(--surface-strong);
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  font-size: 52px;
  font-weight: 850;
  line-height: 1;
}

.current-inputs,
.form-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.current-inputs {
  margin-top: 14px;
}

label {
  display: grid;
  gap: 6px;
  min-width: 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

input,
textarea {
  width: 100%;
  min-width: 0;
  border: 1px solid #cbd6cc;
  border-radius: var(--radius);
  background: #fff;
  color: var(--ink);
  outline: none;
}

input {
  height: 46px;
  padding: 0 10px;
  font-size: 16px;
  font-weight: 760;
}

.stepper {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr) 36px;
  align-items: center;
  min-width: 0;
  overflow: hidden;
  border: 1px solid #cbd6cc;
  border-radius: var(--radius);
  background: #fff;
}

.stepper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(0, 168, 107, 0.16);
}

.stepper input {
  height: 44px;
  border: 0;
  border-radius: 0;
  padding: 0 4px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.stepper input:focus {
  box-shadow: none;
}

.step-button {
  display: grid;
  place-items: center;
  width: 36px;
  height: 44px;
  border-radius: 0;
  background: #f1f5ef;
  color: var(--primary);
  font-size: 20px;
  font-weight: 900;
  line-height: 1;
}

.step-button:active {
  background: #e3ebe0;
}

input:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(0, 168, 107, 0.16);
}

.action-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 42px;
  align-items: stretch;
  gap: 8px;
  margin-top: 14px;
}

.compact-action {
  width: 42px;
  min-height: 42px;
  border-color: #d5ded3;
  background: #f7faf5;
  color: var(--muted);
}

.compact-action svg {
  width: 18px;
  height: 18px;
}

.compact-action:not(:disabled):active {
  background: #e9f0e6;
  color: var(--primary);
}

.next-strip {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 8px;
  width: 100%;
  min-height: 42px;
  margin-top: 10px;
  padding: 0 12px;
  border: 1px solid #d6ded4;
  border-radius: var(--radius);
  background: #f7faf5;
  color: var(--ink);
  text-align: left;
}

.next-strip span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 750;
}

.next-strip strong {
  min-width: 0;
  overflow: hidden;
  font-size: 14px;
  line-height: 1.2;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.primary-action,
.secondary-action,
.finish-button,
.plain-button,
.ghost-button,
.icon-text-button,
.icon-button {
  min-height: 44px;
  border-radius: var(--radius);
  font-weight: 800;
}

.primary-action,
.finish-button {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 8px 18px rgba(0, 168, 107, 0.2);
}

.primary-action:active,
.finish-button:active {
  background: var(--primary-pressed);
}

.primary-action {
  min-height: 58px;
  padding: 0 18px;
  font-size: 20px;
}

.primary-action.compact {
  min-height: 46px;
  font-size: 16px;
}

.secondary-action {
  padding: 0 13px;
  border: 1px solid #cbd6cc;
  background: #fff;
  color: var(--blue);
}

.ghost-button {
  min-height: 36px;
  padding: 0 12px;
  border: 1px solid transparent;
  background: #edf3ec;
  color: var(--primary);
  font-size: 13px;
}

.plain-button {
  padding: 0 11px;
  background: transparent;
  color: var(--primary);
  font-size: 13px;
}

.danger-text {
  color: #b23c22;
}

.icon-button,
.icon-text-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  border: 1px solid #cbd6cc;
  background: #fff;
  color: var(--ink);
}

.icon-button {
  width: 44px;
  padding: 0;
}

.icon-text-button {
  gap: 7px;
  padding: 0 12px;
  color: var(--primary);
}

.record-section,
.data-section,
.history-section {
  padding: 14px;
}

.queue-section {
  max-height: none;
  overflow: auto;
  padding: 10px;
  -webkit-overflow-scrolling: touch;
}

.exercise-list,
.history-list,
.record-exercises {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.queue-section .exercise-list {
  position: relative;
  gap: 6px;
  margin-top: 10px;
  padding-left: 14px;
}

.queue-section .exercise-list::before {
  content: "";
  position: absolute;
  top: 7px;
  bottom: 7px;
  left: 4px;
  width: 2px;
  border-radius: 999px;
  background: #d7dfd4;
}

.exercise-row,
.history-row,
.record-row {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.exercise-row {
  position: relative;
  overflow: hidden;
  background: #f3f1ed;
  touch-action: pan-y;
  user-select: none;
  transition:
    transform 180ms ease,
    box-shadow 180ms ease;
}

.queue-section .exercise-row {
  border-color: #e1e7de;
  background: transparent;
}

.queue-section .exercise-row::before {
  content: "";
  position: absolute;
  top: 50%;
  left: -12px;
  z-index: 2;
  width: 9px;
  height: 9px;
  border: 2px solid #fff;
  border-radius: 50%;
  background: #a9b6a7;
  box-shadow: 0 0 0 1px #d7dfd4;
  transform: translateY(-50%);
}

.queue-section .exercise-row.active::before {
  background: var(--primary);
}

.exercise-card {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  align-items: center;
  min-height: 58px;
  padding: 8px 9px 8px 10px;
  border-radius: calc(var(--radius) - 1px);
  background: #fff;
  transition:
    transform 180ms ease,
    background 180ms ease,
    box-shadow 180ms ease;
}

.queue-section .exercise-card {
  min-height: 44px;
  padding: 6px 8px;
  background: #fbfcfa;
}

.exercise-row.active {
  border-color: rgba(0, 168, 107, 0.45);
  background: #e6efe8;
  box-shadow: inset 3px 0 0 var(--primary);
}

.queue-section .exercise-row.active {
  box-shadow: inset 3px 0 0 var(--primary);
}

.exercise-row.active .exercise-card {
  background: #f4fbf6;
}

.exercise-row.done {
  opacity: 0.72;
}

.exercise-main {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) auto;
  align-items: center;
  column-gap: 8px;
  row-gap: 2px;
  min-width: 0;
  min-height: 44px;
  padding: 0;
  background: transparent;
  color: inherit;
  text-align: left;
}

.exercise-status {
  grid-row: 1 / span 2;
  align-self: stretch;
  display: grid;
  place-items: center;
  min-width: 0;
  border-radius: 6px;
  background: #eef3eb;
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  line-height: 1;
}

.exercise-row.active .exercise-status {
  background: var(--primary);
  color: #fff;
}

.exercise-row.done .exercise-status {
  background: #e7ece3;
  color: #879184;
}

.exercise-title-line {
  grid-column: 2 / -1;
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
}

.exercise-title {
  min-width: 0;
  font-size: 15px;
  font-weight: 850;
  line-height: 1.25;
  overflow-wrap: anywhere;
  white-space: normal;
}

.queue-section .exercise-title {
  font-size: 14px;
  line-height: 1.25;
}

.queue-section .exercise-title-line {
  align-items: flex-start;
  gap: 5px;
}

.queue-section .exercise-badge {
  padding: 2px 6px;
  font-size: 10px;
}

.queue-section .exercise-meta {
  grid-column: 2 / -1;
  font-size: 12px;
  line-height: 1.2;
}

.exercise-badge {
  flex: 0 0 auto;
  border-radius: 999px;
  padding: 2px 7px;
  background: #eaf1e8;
  color: var(--primary);
  font-size: 10px;
  font-weight: 850;
}

.exercise-meta {
  color: var(--muted);
  font-size: 12px;
  font-weight: 720;
  line-height: 1.25;
}

.swipe-actions {
  position: absolute;
  inset: 0 0 0 auto;
  z-index: 0;
  display: grid;
  grid-template-columns: 72px;
  width: 72px;
}

.swipe-action {
  min-height: 100%;
  border: 0;
  border-radius: 0;
  color: #fff;
  font-size: 13px;
  font-weight: 900;
}

.swipe-action.delete {
  background: #c94738;
}

.exercise-row.swiped .exercise-card {
  transform: translateX(-72px);
}

.row-wide-actions {
  display: none;
}

.row-wide-actions button {
  min-height: 38px;
  border-radius: var(--radius);
  background: #f2f5f0;
  color: var(--ink);
  font-size: 13px;
  font-weight: 800;
}

.row-wide-actions button:first-child {
  color: var(--primary);
}

.plan-switcher {
  min-width: 0;
}

.plan-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 0;
  scrollbar-width: none;
}

.plan-tabs::-webkit-scrollbar {
  display: none;
}

.plan-tab {
  flex: 0 0 auto;
  max-width: 132px;
  min-height: 34px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 12px;
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-weight: 850;
  text-overflow: ellipsis;
  white-space: nowrap;
  user-select: none;
}

.plan-tab.active {
  border-color: rgba(0, 168, 107, 0.45);
  background: #eaf4ec;
  color: var(--primary);
}

.plan-tab:active {
  transform: scale(0.98);
}

.plan-save-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.plan-save-actions .plain-button {
  min-height: 34px;
  padding-inline: 8px;
  font-size: 12px;
}

.queue-section.pick-mode {
  border-color: var(--line);
}

.queue-section.pick-mode .exercise-card {
  background: #fbfcfa;
}

.queue-section.pick-mode .exercise-row.active .exercise-card {
  background: #f4fbf6;
}

.finish-section {
  padding: 12px;
  background: transparent;
  border-style: dashed;
  box-shadow: none;
}

.finish-button {
  width: 100%;
  min-height: 52px;
  font-size: 17px;
}

.record-section {
  border-color: rgba(0, 168, 107, 0.38);
}

.data-section {
  border-color: rgba(40, 95, 189, 0.25);
}

.data-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.analytics-summary {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.analytics-metric,
.analytics-block,
.exercise-progress-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fbfcfa;
}

.analytics-metric {
  min-width: 0;
  padding: 10px;
}

.analytics-metric span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 750;
}

.analytics-metric strong {
  display: block;
  margin-top: 3px;
  overflow: hidden;
  font-size: 17px;
  line-height: 1.15;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.analytics-block {
  margin-top: 10px;
  padding: 10px;
}

.block-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}

.block-heading strong {
  font-size: 15px;
  line-height: 1.2;
}

.block-heading span {
  min-width: 0;
  overflow: hidden;
  color: var(--muted);
  font-size: 12px;

          <button class="secondary-action" id="cancelFinishWorkout" type="button">继续训练</button>
